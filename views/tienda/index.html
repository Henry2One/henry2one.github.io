<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos de Programación Básica</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-shape shape-1"></div>
    <div class="background-shape shape-2"></div>

    <main class="container glass-panel">
        <header>
            <h1>Inicia en la Programación</h1>
            <p>Domina las bases del código y comienza tu carrera en el desarrollo de software.</p>
        </header>

        <section class="courses-grid">
            <article class="course-card glass-panel">
                <h2>Fundamentos de Python</h2>
                <p>Aprende sintaxis, variables, ciclos y estructuras de datos.</p>
                <span class="price">$29.00 USD</span>

                <div class="paypal-slot" id="paypal-button-container-python">
                    <button class="mock-btn">Comprar con PayPal (Placeholder)</button>
                </div>
            </article>

            <article class="course-card glass-panel">
                <h2>Lógica de Programación</h2>
                <p>Desarrolla el pensamiento algorítmico y resuelve problemas.</p>
                <span class="price">$19.00 USD</span>

                <div class="paypal-slot" id="paypal-button-container-logic">
                    <button class="mock-btn">Comprar con PayPal (Placeholder)</button>
                </div>
            </article>
        </section>
    </main>

</body>

</html>
